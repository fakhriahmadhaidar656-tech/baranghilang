<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labsky Lost & Found</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background-image: url("bg.jpeg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .card-container {
        background: #ffffff;
        border-radius: 12px;
        padding: 40px 30px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        text-align: center;
        color: #333;
      }

      .logo {
        width: 130px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 5px;
        color: #222;
      }

      p.subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 30px;
      }

      .btn {
        border: none;
        padding: 14px;
        border-radius: 8px;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        margin-bottom: 15px;
        transition: 0.3s;
      }

      .btn-hilang {
        background: #e74c3c;
      }
      .btn-hilang:hover {
        background: #c0392b;
      }

      .btn-nemu {
        background: #27ae60;
      }
      .btn-nemu:hover {
        background: #219150;
      }

      .btn-submit {
        background: #8e04a1;
        margin-top: 10px;
      }
      .btn-submit:hover {
        background: #710381;
      }

      .form-group {
        margin-bottom: 15px;
        text-align: left;
      }

      .form-group label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
        font-weight: 600;
        color: #444;
      }

      .form-control {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
      }

      .form-control:focus {
        border-color: #8e04a1;
      }

      textarea.form-control {
        resize: none;
        height: 90px;
      }

      .page-section {
        display: none;
      }
      .page-section.active {
        display: block;
        animation: fadeIn 0.4s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .back-link {
        display: inline-block;
        margin-top: 20px;
        font-size: 14px;
        color: #8e04a1;
        text-decoration: none;
        cursor: pointer;
        font-weight: 600;
      }

      .success-box {
        background: #e8f8f5;
        color: #27ae60;
        border: 1px solid #27ae60;
        padding: 25px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 18px;
      }

      .loading {
        opacity: 0.6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="card-container">
      <div id="homePage" class="page-section active">
        <img src="logo.jpeg" alt="Logo Labsky" class="logo" />
        <h1>SMA LABSCHOOL KEBAYORAN</h1>
        <p class="subtitle">Sistem Pelaporan Lost and Found</p>
        <button class="btn btn-hilang" onclick="bukaForm('HILANG')">
          Form Kehilangan
        </button>
        <button class="btn btn-nemu" onclick="bukaForm('DITEMUKAN')">
          Form Penemuan
        </button>
      </div>

      <div id="reportPage" class="page-section">
        <h1 id="formTitle">Form Laporan</h1>
        <p class="subtitle">Silakan lengkapi data di bawah ini</p>

        <form id="laporForm">
          <input type="hidden" id="statusLaporan" />

          <div class="form-group">
            <label>Nama Anda</label>
            <input
              type="text"
              id="namaPelapor"
              class="form-control"
              placeholder="Nama lengkap"
              required
            />
          </div>
          <div class="form-group">
            <label id="labelStatusPelapor">Kelas</label>
            <input
              type="text"
              id="statusPelapor"
              class="form-control"
              placeholder="Contoh: XI - A"
              required
            />
          </div>
          <div class="form-group">
            <label>No. WhatsApp</label>
            <input
              type="tel"
              id="noTelp"
              class="form-control"
              placeholder="08xxxxxxxxxx"
              oninput="this.value = this.value.replace(/[^0-9]/g, '')"
              required
            />
          </div>

          <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0" />

          <div class="form-group">
            <label id="labelDetailBarang">Barang yang Hilang</label>
            <textarea
              id="detailBarang"
              class="form-control"
              placeholder="Contoh: tumbler corkcicle putih 600ml ada sticker spongebobnya"
              required
            ></textarea>
          </div>
          <div class="form-group">
            <label id="labelLokasi">Lokasi</label>
            <input
              type="text"
              id="lokasi"
              class="form-control"
              placeholder="Contoh: Kantin"
              required
            />
          </div>
          <div class="form-group">
            <label id="labelTanggal">Tanggal</label>
            <input type="date" id="tanggal" class="form-control" required />
          </div>
          <div class="form-group">
            <label id="labelFoto">Upload Foto Barang</label>
            <input
              type="file"
              id="foto"
              class="form-control"
              accept="image/*"
            />
          </div>

          <button type="submit" id="submitBtn" class="btn btn-submit">
            Submit Laporan
          </button>
        </form>
        <span class="back-link" onclick="kembaliKeHome()">← Kembali</span>
      </div>

      <div id="successPage" class="page-section">
        <div class="success-box">Laporan sudah masuk ke grup!</div>
        <p style="font-size: 14px; color: #777; margin-top: 20px">
          Mengalihkan kembali ke menu utama...
        </p>
      </div>
    </div>

    <script>
      const BOT_TOKEN = "8859341921:AAGlZqGE8CiJ0sCjUT6WP_KAHMotMJsJA5I";
      const CHAT_ID = "-5299468744";

      const hariIni = new Date().toISOString().split("T")[0];
      document.getElementById("tanggal").setAttribute("max", hariIni);

      function formatTanggalIndo(tanggalString) {
        const dateObj = new Date(tanggalString);
        const options = {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        };
        return dateObj.toLocaleDateString("id-ID", options);
      }

      function bukaForm(status) {
        document.getElementById("statusLaporan").value = status;
        const fotoInput = document.getElementById("foto");

        if (status === "HILANG") {
          document.getElementById("formTitle").innerText = "Form Kehilangan";
          document.getElementById("labelStatusPelapor").innerText = "Kelas";
          document.getElementById("statusPelapor").placeholder =
            "Contoh: XI - A";
          document.getElementById("labelDetailBarang").innerText =
            "Barang yang Hilang";
          document.getElementById("labelLokasi").innerText =
            "Tempat Terakhir Dilihat";
          document.getElementById("labelTanggal").innerText = "Tanggal Hilang";
          document.getElementById("labelFoto").innerText =
            "Upload Foto Barang (Optional)";
          fotoInput.removeAttribute("required");
        } else {
          document.getElementById("formTitle").innerText = "Form Penemuan";
          document.getElementById("labelStatusPelapor").innerText =
            "Kelas / Jabatan";
          document.getElementById("statusPelapor").placeholder =
            "Contoh: XI - A / Guru / OB";
          document.getElementById("labelDetailBarang").innerText =
            "Barang yang Ditemukan";
          document.getElementById("labelLokasi").innerText = "Lokasi Ditemukan";
          document.getElementById("labelTanggal").innerText = "Tanggal Nemu";
          document.getElementById("labelFoto").innerText =
            "Upload Foto Barang (Wajib)";
          fotoInput.setAttribute("required", "required");
        }
        document.getElementById("homePage").classList.remove("active");
        document.getElementById("reportPage").classList.add("active");
      }

      function kembaliKeHome() {
        document.getElementById("laporForm").reset();
        document.getElementById("successPage").classList.remove("active");
        document.getElementById("reportPage").classList.remove("active");
        document.getElementById("homePage").classList.add("active");
      }

      document
        .getElementById("laporForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const statusLaporan = document.getElementById("statusLaporan").value;
          const namaPelapor = document.getElementById("namaPelapor").value;
          const statusPelapor = document.getElementById("statusPelapor").value;
          const noTelp = document.getElementById("noTelp").value;
          const detailBarang = document.getElementById("detailBarang").value;
          const lokasi = document.getElementById("lokasi").value;
          const tanggalRaw = document.getElementById("tanggal").value;
          const fileInput = document.getElementById("foto");

          const btn = document.getElementById("submitBtn");
          btn.classList.add("loading");
          btn.innerHTML = "Mengirim...";

          const waLink = `https://wa.me/62${noTelp.substring(1)}`;
          const tglIndo = formatTanggalIndo(tanggalRaw);

          const judul =
            statusLaporan === "HILANG" ? "BARANG HILANG" : "PENEMUAN BARANG";
          const labelStatus =
            statusLaporan === "HILANG" ? "Kelas" : "Kelas/Jabatan";

          const caption =
            `*LAPORAN ${judul}*\n\n` +
            `Nama Pelapor: ${namaPelapor}\n` +
            `${labelStatus}: ${statusPelapor}\n` +
            `WhatsApp: [Klik Chat](${waLink}) (${noTelp})\n\n` +
            `Barang: ${detailBarang}\n` +
            `Lokasi: ${lokasi}\n` +
            `Tanggal: ${tglIndo}\n\n` +
            `_Dikirim dari Labsky Lost and Found_`;

          const formData = new FormData();
          formData.append("chat_id", CHAT_ID);
          formData.append("parse_mode", "Markdown");

          let url = "";

          if (fileInput.files.length > 0) {
            url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            formData.append("photo", fileInput.files[0]);
            formData.append("caption", caption);
          } else {
            url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            formData.append("text", caption);
          }

          try {
            const response = await fetch(url, {
              method: "POST",
              body: formData,
            });

            if (response.ok) {
              document.getElementById("reportPage").classList.remove("active");
              document.getElementById("successPage").classList.add("active");
              setTimeout(kembaliKeHome, 3000);
            } else {
              const errData = await response.json();
              alert("Gagal mengirim: " + errData.description);
            }
          } catch (error) {
            alert("Terjadi kesalahan koneksi.");
          } finally {
            btn.classList.remove("loading");
            btn.innerHTML = "Submit Laporan";
          }
        });
    </script>
  </body>
</html>
